name: PR Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Build packages
        run: pnpm build:packages

      - name: Verify package contents
        run: pnpm pack:check

  codeql:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Check code scanning availability
        id: code_scanning
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          endpoint="https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts?per_page=1"
          status=$(curl -sS -o /tmp/code_scanning_resp.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "$endpoint" || true)

          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=false" >> "$GITHUB_OUTPUT"
          echo "Skipping CodeQL because code scanning API is unavailable (HTTP $status)." >> "$GITHUB_STEP_SUMMARY"
          echo "If you want uploads, enable Code Scanning in repository settings and ensure appropriate permissions." >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout repository
        if: steps.code_scanning.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        if: steps.code_scanning.outputs.enabled == 'true'
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        if: steps.code_scanning.outputs.enabled == 'true'
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        if: steps.code_scanning.outputs.enabled == 'true'
        uses: github/codeql-action/analyze@v3

  test_case_check:
    needs: codeql
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest with coverage report
        id: vitest
        run: |
          mkdir -p reports
          set +e
          pnpm vitest run \
            --coverage \
            --coverage.reporter=text \
            --coverage.reporter=lcov \
            --coverage.reporter=json-summary \
            --reporter=default \
            --reporter=json \
            --outputFile=reports/vitest-report.json
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Measure code duplication
        id: duplication
        run: |
          mkdir -p reports/jscpd
          set +e
          pnpm dlx jscpd packages apps/showcase/src \
            --gitignore \
            --threshold 100 \
            --reporters json \
            --output reports/jscpd
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Generate PR test summary
        env:
          TEST_EXIT_CODE: ${{ steps.vitest.outputs.exit_code }}
          DUPLICATION_EXIT_CODE: ${{ steps.duplication.outputs.exit_code }}
        run: node scripts/ci/generate-pr-test-report.mjs

      - name: Upload test quality artifacts
        id: upload_test_quality_artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-test-quality-report
          path: |
            coverage
            reports

      - name: Update PR summary comment
        if: always()
        uses: actions/github-script@v7
        env:
          TEST_EXIT_CODE: ${{ steps.vitest.outputs.exit_code }}
          DUPLICATION_EXIT_CODE: ${{ steps.duplication.outputs.exit_code }}
          ARTIFACT_URL: ${{ steps.upload_test_quality_artifacts.outputs.artifact-url }}
        with:
          script: |
            const fs = require('node:fs');
            const path = require('node:path');

            const pullRequest = context.payload.pull_request;
            if (!pullRequest) {
              core.info('No pull request payload found.');
              return;
            }

            const requiredJobs = ['validate', 'codeql', 'test_case_check'];
            const scopeByJob = {
              validate: 'Typecheck, package build, and pack validation.',
              codeql: 'Code scanning and security analysis.',
              test_case_check: 'Vitest coverage run and duplication analysis.',
            };
            const labelByConclusion = {
              success: 'SUCCESS',
              failure: 'FAILURE',
              cancelled: 'CANCELLED',
              skipped: 'SKIPPED',
              neutral: 'NEUTRAL',
              timed_out: 'TIMED OUT',
              action_required: 'ACTION REQUIRED',
              queued: 'QUEUED',
              in_progress: 'IN PROGRESS',
            };

            function readJson(filePath) {
              if (!fs.existsSync(filePath)) {
                return null;
              }

              return JSON.parse(fs.readFileSync(filePath, 'utf8'));
            }

            function formatPercent(value) {
              return typeof value === 'number' && !Number.isNaN(value)
                ? `${value.toFixed(2)}%`
                : 'Unavailable';
            }

            const coverageSummary = readJson(path.join(process.cwd(), 'coverage', 'coverage-summary.json'));
            const vitestReport = readJson(path.join(process.cwd(), 'reports', 'vitest-report.json'));
            const duplicationReport = readJson(path.join(process.cwd(), 'reports', 'jscpd', 'jscpd-report.json'));

            const totalCoverage = coverageSummary?.total ?? {};
            const duplicationStats = duplicationReport?.statistics?.total ?? duplicationReport?.statistics ?? {};
            const totalTests = vitestReport?.numTotalTests ?? 'Unavailable';
            const passedTests = vitestReport?.numPassedTests ?? 'Unavailable';
            const failedTests = vitestReport?.numFailedTests ?? 'Unavailable';
            const duplicationPercentage = formatPercent(duplicationStats.percentage);
            const testExitCode = process.env.TEST_EXIT_CODE ?? '1';
            const duplicationExitCode = process.env.DUPLICATION_EXIT_CODE ?? '1';
            const testCaseConclusion = testExitCode === '0' ? 'success' : 'failure';

            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              per_page: 100,
            });

            const rows = requiredJobs.map((jobName) => {
              const job = jobs.jobs.find((entry) => entry.name === jobName);
              const conclusion = jobName === 'test_case_check'
                ? testCaseConclusion
                : (job?.conclusion ?? job?.status ?? 'unknown');
              const label = labelByConclusion[conclusion] ?? conclusion.toUpperCase();
              const detailsUrl = job?.html_url ?? `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

              return `| ${jobName} | ${label} | ${scopeByJob[jobName]} | [View details](${detailsUrl}) |`;
            });

            const artifactUrl = process.env.ARTIFACT_URL;
            const artifactLine = artifactUrl
              ? `Artifacts: [pr-test-quality-report](${artifactUrl})`
              : 'Artifacts: available from the workflow run page.';

            const overallResult = testExitCode === '0' ? 'SUCCESS' : 'FAILURE';
            const body = [
              '<!-- pr-check-summary -->',
              '## PR Check Summary',
              '',
              `Workflow: [PR Checks](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              `Overall result: ${overallResult}`,
              '',
              '| Check | Result | Scope | Details |',
              '| --- | --- | --- | --- |',
              ...rows,
              '',
              '### Test Case Check Metrics',
              '',
              '| Metric | Value |',
              '| --- | --- |',
              `| Total Tests | ${totalTests} |`,
              `| Passed Tests | ${passedTests} |`,
              `| Failed Tests | ${failedTests} |`,
              `| Coverage Lines | ${formatPercent(totalCoverage.lines?.pct)} |`,
              `| Coverage Branches | ${formatPercent(totalCoverage.branches?.pct)} |`,
              `| Coverage Functions | ${formatPercent(totalCoverage.functions?.pct)} |`,
              `| Coverage Statements | ${formatPercent(totalCoverage.statements?.pct)} |`,
              `| Code Duplication | ${duplicationExitCode === '0' ? duplicationPercentage : 'Unavailable'} |`,
              '',
              artifactLine,
              '',
              'This comment is updated automatically for each PR checks run.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pullRequest.number,
              per_page: 100,
            });

            const existingComment = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes('<!-- pr-check-summary -->'),
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
              core.info(`Updated PR summary comment for #${pullRequest.number}.`);
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pullRequest.number,
              body,
            });
            core.info(`Created PR summary comment for #${pullRequest.number}.`);

      - name: Fail when tests do not pass
        if: steps.vitest.outputs.exit_code != '0'
        run: |
          echo "Vitest reported failing tests or coverage threshold violations." >&2
          exit 1