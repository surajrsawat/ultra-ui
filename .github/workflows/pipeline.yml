name: PR Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Build packages
        run: pnpm build:packages

      - name: Verify package contents
        run: pnpm pack:check

  codeql:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Check code scanning availability
        id: code_scanning
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          endpoint="https://api.github.com/repos/${{ github.repository }}/code-scanning/alerts?per_page=1"
          status=$(curl -sS -o /tmp/code_scanning_resp.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            "$endpoint" || true)

          if [ "$status" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=false" >> "$GITHUB_OUTPUT"
          echo "Skipping CodeQL because code scanning API is unavailable (HTTP $status)." >> "$GITHUB_STEP_SUMMARY"
          echo "If you want uploads, enable Code Scanning in repository settings and ensure appropriate permissions." >> "$GITHUB_STEP_SUMMARY"

      - name: Checkout repository
        if: steps.code_scanning.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        if: steps.code_scanning.outputs.enabled == 'true'
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        if: steps.code_scanning.outputs.enabled == 'true'
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        if: steps.code_scanning.outputs.enabled == 'true'
        uses: github/codeql-action/analyze@v3

  test_case_check:
    needs: codeql
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Vitest with coverage report
        id: vitest
        run: |
          mkdir -p reports
          set +e
          pnpm vitest run \
            --coverage \
            --coverage.reporter=text \
            --coverage.reporter=lcov \
            --coverage.reporter=json-summary \
            --reporter=default \
            --reporter=json \
            --outputFile=reports/vitest-report.json
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Measure code duplication
        id: duplication
        run: |
          mkdir -p reports/jscpd
          set +e
          pnpm dlx jscpd packages apps/showcase/src \
            --gitignore \
            --threshold 100 \
            --reporters json \
            --output reports/jscpd
          exit_code=$?
          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Generate PR test summary
        env:
          TEST_EXIT_CODE: ${{ steps.vitest.outputs.exit_code }}
          DUPLICATION_EXIT_CODE: ${{ steps.duplication.outputs.exit_code }}
        run: node scripts/ci/generate-pr-test-report.mjs

      - name: Upload test quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-test-quality-report
          path: |
            coverage
            reports

      - name: Fail when tests do not pass
        if: steps.vitest.outputs.exit_code != '0'
        run: |
          echo "Vitest reported failing tests or coverage threshold violations." >&2
          exit 1