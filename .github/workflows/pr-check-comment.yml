name: PR Check Comment

on:
  workflow_run:
    workflows:
      - PR Checks
    types:
      - completed

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  comment_summary:
    if: github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Post PR check summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const pr = run.pull_requests?.[0];

            if (!pr) {
              core.info('No pull request associated with this workflow run.');
              return;
            }

            const jobs = await github.paginate(github.rest.actions.listJobsForWorkflowRun, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id,
              per_page: 100,
            });

            const requiredJobs = ['validate', 'codeql', 'test_case_check'];
            const statusIcon = {
              success: 'SUCCESS',
              failure: 'FAILURE',
              cancelled: 'CANCELLED',
              skipped: 'SKIPPED',
              neutral: 'NEUTRAL',
              timed_out: 'TIMED OUT',
              action_required: 'ACTION REQUIRED',
              in_progress: 'IN PROGRESS',
              queued: 'QUEUED',
            };

            const rows = requiredJobs.map((jobName) => {
              const job = jobs.find((entry) => entry.name === jobName);
              const conclusion = job?.conclusion ?? job?.status ?? 'unknown';
              const label = statusIcon[conclusion] ?? conclusion.toUpperCase();
              const detailsUrl = job?.html_url ?? run.html_url;
              const summary = {
                validate: 'Typecheck, package build, and pack validation.',
                codeql: 'Code scanning and security analysis.',
                test_case_check: 'Vitest coverage run and duplication analysis.',
              }[jobName] ?? '';

              return `| ${jobName} | ${label} | ${summary} | [View details](${detailsUrl}) |`;
            });

            const overall = run.conclusion ? run.conclusion.toUpperCase() : 'UNKNOWN';
            const body = [
              '<!-- pr-check-summary -->',
              '## PR Check Summary',
              '',
              `Workflow: [PR Checks](${run.html_url})`,
              `Overall result: ${overall}`,
              '',
              '| Check | Result | Scope | Details |',
              '| --- | --- | --- | --- |',
              ...rows,
              '',
              'This comment is updated automatically after each PR checks run.',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const existingComment = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes('<!-- pr-check-summary -->'),
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
              core.info(`Updated PR summary comment for #${pr.number}.`);
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
            core.info(`Created PR summary comment for #${pr.number}.`);